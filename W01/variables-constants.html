    <title>WDD131 | W01 Variables and Constants</title>
    <script>
        // Welcome to JS
        // Script tags can go in the head or at the bottom of the html,
        // depends on when you want to the JS to load. 

        // Variables - declare any type of variable with the keyword "let".
        let name = "Nico";
        let age = 25;

        console.log(name);

        // constant variable - a variable that will never change, and cannot. 
        const nameOfTheChurch = "The Church of Jesus Christ of Latter-day Saints"
        console.log(nameOfTheChurch)

        // Demo of scope - scope matters, and variables declared in blocks
        // like an If block would only be accessable in that block.
        if (name === "Nico") {
            let response = "Welcome, Mr Furtado";
        };
        console.log(response);
    </script>
